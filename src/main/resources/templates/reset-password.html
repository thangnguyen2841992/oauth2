<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đặt lại mật khẩu</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">

  <h2 class="text-2xl font-bold text-center mb-2">Đặt lại mật khẩu</h2>
  <p class="text-center text-gray-500 mb-6">Nhập mật khẩu mới của bạn</p>

  <form method="post" action="/reset-password" class="space-y-4">

    <!-- key -->
    <input type="hidden" name="key" th:value="${key}"/>

    <!-- password -->
    <div>
      <label class="text-sm font-medium">Mật khẩu mới</label>
      <div class="relative">
        <input id="password" name="password" type="password"
               class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"
               required/>
        <button type="button" onclick="toggle('password')"
                class="absolute right-3 top-2 text-gray-500">👁</button>
      </div>

      <!-- strength -->
      <div class="h-2 bg-gray-200 rounded mt-2">
        <div id="strengthBar" class="h-2 bg-red-500 w-1/4 rounded"></div>
      </div>
      <p id="strengthText" class="text-xs mt-1 text-gray-500">Yếu</p>
    </div>

    <!-- confirm -->
    <div>
      <label class="text-sm font-medium">Xác nhận mật khẩu</label>
      <div class="relative">
        <input id="confirm" type="password"
               class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"
               required/>
        <button type="button" onclick="toggle('confirm')"
                class="absolute right-3 top-2 text-gray-500">👁</button>
      </div>
      <p id="matchText" class="text-xs mt-1"></p>
    </div>

    <!-- submit -->
    <button type="submit"
            class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">
      Cập nhật mật khẩu
    </button>
  </form>
</div>

<script>
  function toggle(id) {
    const input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
  }

  const password = document.getElementById("password");
  const confirm = document.getElementById("confirm");

  const strengthBar = document.getElementById("strengthBar");
  const strengthText = document.getElementById("strengthText");
  const matchText = document.getElementById("matchText");

  password.addEventListener("input", () => {
    const val = password.value;
    let strength = 0;

    if (val.length > 6) strength++;
    if (/[A-Z]/.test(val)) strength++;
    if (/[0-9]/.test(val)) strength++;
    if (/[^A-Za-z0-9]/.test(val)) strength++;

    const widths = ["25%", "50%", "75%", "100%"];
    const texts = ["Yếu", "Trung bình", "Khá", "Mạnh"];
    const colors = ["bg-red-500", "bg-yellow-500", "bg-blue-500", "bg-green-500"];

    if (strength > 0) {
      strengthBar.className = "h-2 rounded " + colors[strength-1];
      strengthBar.style.width = widths[strength-1];
      strengthText.innerText = texts[strength-1];
    }
  });

  confirm.addEventListener("input", () => {
    if (confirm.value !== password.value) {
      matchText.innerText = "❌ Mật khẩu không khớp";
      matchText.className = "text-red-500 text-xs";
    } else {
      matchText.innerText = "✅ Khớp";
      matchText.className = "text-green-500 text-xs";
    }
  });
</script>

</body>
</html>
