<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký</title>

    <!-- Bootstrap + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            height: 100vh;
        }

        .register-card {
            width: 450px;
            border-radius: 20px;
        }

        .form-control {
            border-radius: 10px;
        }

        .btn-primary {
            border-radius: 10px;
            font-weight: 500;
        }

        .title {
            font-weight: bold;
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center">

<div class="card register-card shadow-lg p-4 bg-white">

    <div class="text-center mb-4">
        <i class="bi bi-person-plus-fill" style="font-size: 3rem; color: #667eea;"></i>
        <h3 class="title mt-2">Tạo tài khoản</h3>
    </div>

    <form th:action="@{http://localhost:8082/api/auth/register}" method="post">

        <!-- Username -->
        <div class="mb-3">
            <label class="form-label">Tên đăng nhập</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" name="username" class="form-control" placeholder="Nhập username" required>
            </div>
        </div>

        <!-- First Name -->
        <div class="mb-3">
            <label class="form-label">Tên</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                <input type="text" name="firstName" class="form-control" placeholder="Nhập tên" required>
            </div>
        </div>

        <!-- Last Name -->
        <div class="mb-3">
            <label class="form-label">Họ</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person-vcard"></i></span>
                <input type="text" name="lastName" class="form-control" placeholder="Nhập họ" required>
            </div>
        </div>

        <!-- Email -->
        <div class="mb-3">
            <label class="form-label">Email</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" name="email" class="form-control" placeholder="Nhập email" required>
            </div>
        </div>
        <!-- Birthday -->
        <div class="mb-3">
            <label class="form-label">Ngày sinh</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-calendar-date"></i></span>
                <input type="date" name="birthday" class="form-control">
            </div>
        </div>

        <!-- Address -->
        <div class="mb-3">
            <label class="form-label">Địa chỉ</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-geo-alt"></i></span>
                <input type="text" name="address" class="form-control" placeholder="Nhập địa chỉ">
            </div>
        </div>

        <!-- Error / Success -->
        <div class="text-danger text-center mb-3" th:if="${error}" th:text="${error}"></div>
        <div class="text-success text-center mb-3" th:if="${message}" th:text="${message}"></div>

        <!-- Button -->
        <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-person-plus"></i> Đăng ký
        </button>

    </form>

    <!-- Link login -->
    <div class="text-center mt-3">
        <small>Đã có tài khoản? <a href="http://localhost:8082/api/auth/login">Đăng nhập</a></small>
    </div>

</div>

</body>
</html>
