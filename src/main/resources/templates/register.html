<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký</title>

    <!-- Bootstrap + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            background-size: cover;
            background: url('/images/anh1.jpg') no-repeat fixed center;
            font-family: 'Segoe UI', sans-serif;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.45);
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .register-card {
            width: 420px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
        }

        .title {
            font-weight: bold;
            color: #dc2626;
        }

        .form-control {
            border-radius: 10px;
        }

        .input-group-text {
            border-radius: 10px 0 0 10px;
        }

        .eye-btn {
            border-radius: 0 10px 10px 0;
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            border: none;
            border-radius: 12px;
            font-weight: 500;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #dc2626, #b91c1c);
        }

        .footer {
            text-align: center;
            margin-top: 15px;
        }

        .login-link {
            color: #dc2626;
            font-weight: 500;
            text-decoration: none;
        }

        .login-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="overlay">
    <div class="register-card shadow-lg">

        <div class="text-center mb-3">
            <i class="bi bi-torii-gate-fill" style="font-size: 2.5rem; color:#dc2626;"></i>
            <h4 class="title mt-2">Tạo tài khoản</h4>
        </div>

        <form th:action="@{http://localhost:8082/api/auth/register}" method="post">

            <!-- Email -->
            <div class="mb-3 input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" name="email" class="form-control" placeholder="Email" required>
            </div>

            <!-- Name -->
            <div class="row">
                <div class="col-6 mb-3 input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" name="lastName" class="form-control" placeholder="Họ" required>
                </div>
                <div class="col-6 mb-3 input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" name="firstName" class="form-control" placeholder="Tên" required>
                </div>
            </div>

            <!-- Birthday -->
            <div class="mb-3 input-group">
                <span class="input-group-text"><i class="bi bi-calendar"></i></span>
                <input type="date" name="birthday" class="form-control">
            </div>

            <!-- Address -->
            <div class="mb-3 input-group">
                <span class="input-group-text"><i class="bi bi-geo-alt"></i></span>
                <input type="text" name="address" class="form-control" placeholder="Địa chỉ">
            </div>

            <!-- Message -->
            <div class="text-danger text-center mb-2" th:if="${error}" th:text="${error}"></div>
            <div class="text-success text-center mb-2" th:if="${message}" th:text="${message}"></div>

            <!-- Button -->
            <button class="btn btn-primary w-100">
                <i class="bi bi-person-plus"></i> Đăng ký
            </button>
        </form>

        <div class="footer">
            Đã có tài khoản?
            <a href="http://localhost:8082/api/auth/login" class="login-link">Đăng nhập</a>
        </div>

    </div>
</div>

<script>
    function togglePassword(inputId, el) {
        const input = document.getElementById(inputId);
        const icon = el.querySelector("i");

        if (input.type === "password") {
            input.type = "text";
            icon.classList.replace("bi-eye", "bi-eye-slash");
        } else {
            input.type = "password";
            icon.classList.replace("bi-eye-slash", "bi-eye");
        }
    }
</script>

</body>
</html>
