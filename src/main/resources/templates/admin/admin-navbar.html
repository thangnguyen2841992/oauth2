<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body><!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light navbar-custom px-4">
    <a class="navbar-brand fw-bold text-primary" href="#">🇯🇵 NihongoApp</a>

    <div class="ms-auto d-flex align-items-center">

        <!-- Nếu đã login -->
        <div th:if="${isLoggedIn}">
            <span class="me-3">Xin chào, <b th:text="${name}">User</b></span>
            <a href="http://localhost:8082/api/auth/logout" class="btn btn-outline-danger btn-sm">Logout</a>
        </div>

        <!-- Nếu chưa login -->
        <div th:if="${!isLoggedIn}">
            <a href="http://localhost:8082/api/auth/login" class="btn btn-primary btn-sm">
                <i class="bi bi-box-arrow-in-right"></i> Đăng nhập
            </a>
        </div>

    </div>
</nav>
</body>
</html>
