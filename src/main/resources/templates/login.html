<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: #fff;
            padding: 40px;
            border-radius: 16px;
            width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        .container h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .form-group label {
            font-size: 14px;
            color: #555;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.2s;
        }

        .form-group input:focus {
            border-color: #667eea;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        .login-btn:hover {
            background: #5a67d8;
        }

        .divider {
            margin: 20px 0;
            display: flex;
            align-items: center;
            text-align: center;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid #ddd;
        }

        .divider span {
            margin: 0 10px;
            font-size: 12px;
            color: #999;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;

            padding: 10px;
            border-radius: 8px;

            background-color: #fff;
            border: 1px solid #dadce0;

            text-decoration: none;
            color: #3c4043;
            font-weight: 500;

            transition: all 0.2s ease;
        }

        .google-btn img {
            width: 20px;
        }

        .google-btn:hover {
            background-color: #f7f8f8;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        .google-btn:active {
            transform: scale(0.98);
        }

    </style>
</head>

<body>

<div class="container">
    <h2>Đăng nhập</h2>

    <!-- Form login -->
    <form th:action="@{http://localhost:8082/api/auth/login}" method="post">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>

        <button type="submit" class="login-btn">Login</button>
    </form>

    <!-- Divider -->
    <div class="divider">
        <span>OR</span>
    </div>

    <!-- Google login -->
    <a th:href="@{http://localhost:8180/realms/nihongo/protocol/openid-connect/auth(
        client_id='your-client-id',
        redirect_uri='http://localhost:8082/login/oauth2/code/keycloak',
        response_type='code',
        scope='openid'
    )}" class="google-btn">

        <img src="https://developers.google.com/identity/images/g-logo.png">
        <span>Đăng nhập với Google</span>

    </a>
</div>

</body>
</html>
