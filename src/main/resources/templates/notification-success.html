<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Check Email</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #eef2ff, #ecfdf5);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 400px;
            background: #fff;
            border-radius: 18px;
            padding: 35px 30px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
            animation: fadeIn 0.6s ease;
        }

        .icon {
            font-size: 55px;
            animation: bounce 1.5s infinite;
        }

        h2 {
            margin: 15px 0 10px;
            color: #111827;
        }

        p {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .email {
            color: #4f46e5;
            font-weight: 600;
        }

        .btn-group {
            margin-top: 20px;
        }

        .btn {
            display: inline-block;
            padding: 10px 18px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
            margin: 5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(79, 70, 229, 0.3);
        }

        .btn-outline {
            border: 1px solid #d1d5db;
            color: #374151;
        }

        .btn-outline:hover {
            background: #f3f4f6;
        }

        .resend {
            margin-top: 15px;
            font-size: 13px;
            color: #6b7280;
        }

        .resend button {
            border: none;
            background: none;
            color: #16a34a;
            font-weight: 500;
            cursor: pointer;
        }

        .resend button:disabled {
            color: #9ca3af;
            cursor: not-allowed;
        }

        .note {
            margin-top: 15px;
            font-size: 12px;
            color: #9ca3af;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #111827;
            color: #fff;
            padding: 12px 18px;
            border-radius: 8px;
            opacity: 0;
            transform: translateY(20px);
            transition: 0.3s;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        .resend {
            margin-top: 15px;
            font-size: 13px;
            color: #6b7280;
        }

        .resend button {
            padding: 6px 14px;
            border-radius: 999px;
            border: none;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;

            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;

            transition: all 0.25s ease;
            box-shadow: 0 4px 10px rgba(34, 197, 94, 0.3);
        }

        /* hover */
        .resend button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 14px rgba(34, 197, 94, 0.4);
        }

        /* click */
        .resend button:active {
            transform: scale(0.96);
        }

        /* disabled */
        .resend button:disabled {
            background: #9ca3af;
            box-shadow: none;
            cursor: not-allowed;
        }
    </style>
</head>

<body>

<div class="card">
    <div class="icon">📧</div>

    <h2>Kiểm tra email</h2>

    <p>
        Chúng tôi đã gửi link kích hoạt đến
        <span class="email" th:text="${email}">example@gmail.com</span>
    </p>

    <p>Vui lòng mở email và click vào link để kích hoạt tài khoản.</p>

    <div class="btn-group">
        <a href="https://mail.google.com" target="_blank" class="btn btn-primary">
            Mở Gmail
        </a>

        <a href="/" class="btn btn-outline">
            Trang chủ
        </a>
    </div>

    <div class="resend">
        Không nhận được email?
        <button id="resendBtn"
                th:data-userid="${userId}"
                onclick="resendEmail()"
                style="display: none;">
            🔄 Gửi lại
        </button>
        <span id="countdown"></span>
    </div>

    <div class="note">
        Kiểm tra cả thư mục Spam nếu bạn không thấy email.
    </div>
</div>

<script>
    let timeLeft = 30;
    const btn = document.getElementById("resendBtn");
    const countdown = document.getElementById("countdown");

    function startCountdown() {
        btn.style.display = "none"; // Ẩn nút
        countdown.style.display = "inline"; // Hiện countdown

        const timer = setInterval(() => {
            timeLeft--;
            countdown.innerText = ` (${timeLeft}s)`;

            if (timeLeft <= 0) {
                clearInterval(timer);
                // 👉 Hết thời gian
                btn.style.display = "inline-block"; // Hiện nút
                countdown.style.display = "none";   // Ẩn countdown
                timeLeft = 30;
            }
        }, 1000);
    }

    function showToast(message) {
        const toast = document.getElementById("toast");
        toast.innerText = message;
        toast.classList.add("show");

        setTimeout(() => {
            toast.classList.remove("show");
        }, 3000);
    }

    function resendEmail() {
        const btn = document.getElementById("resendBtn");
        const userId = btn.getAttribute("data-userid");

        btn.disabled = true;
        btn.innerText = "Đang gửi...";

        fetch("http://localhost:8082/api/active-user/resend-active", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: `userId=${userId}`
        })
            .then(res => res.text())
            .then(data => {
                showToast("📩 Đã gửi lại email kích hoạt!");
                startCountdown();
                btn.innerText = "Gửi lại";
            })
            .catch(err => {
                showToast("❌ Có lỗi xảy ra!");
                btn.disabled = false;
                btn.innerText = "Gửi lại";
            });
    }

    // auto start lần đầu
    startCountdown();
</script>

</body>
</html>
